<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Countdown</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #d4a017;
  --gold-glow: rgba(212, 160, 23, 0.4);
  --glass-dark: rgba(10, 15, 25, 0.8);
  --glass-light: rgba(255, 255, 255, 0.8);
  --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Montserrat', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  color: #fff;
  transition: background 0.5s ease;
}

body.light { color: #222; }

/* DYNAMIC BACKGROUND */
.bg {
  position: fixed;
  inset: -10%;
  z-index: -1;
  background-size: cover;
  background-position: center;
  transition: transform 0.1s ease-out;
}

body.dark .bg { background-image: url('https://images.unsplash.com/photo-1475274047050-1d0c0975c63e?q=80&w=2070'); filter: brightness(0.4); }
body.light .bg { background-image: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070'); filter: brightness(0.9); }

/* FLOATING THEME TOGGLE */
.theme-btn {
  position: absolute;
  top: 25px;
  right: 25px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  background: var(--glass-dark);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  font-size: 20px;
  z-index: 100;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
  transition: var(--transition);
}

.theme-btn:hover { transform: scale(1.1) rotate(15deg); }

/* MAIN CONTAINER */
.container {
  width: 90%;
  max-width: 600px;
  perspective: 1000px;
}

.card {
  position: relative;
  background: var(--glass-dark);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 30px;
  padding: 40px 20px;
  text-align: center;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  transform-style: preserve-3d;
}

body.light .card { background: var(--glass-light); border: 1px solid rgba(0,0,0,0.05); }

/* BORDER ANIMATION */
.card::before {
  content: '';
  position: absolute;
  inset: -2px;
  border-radius: 32px;
  background: linear-gradient(45deg, var(--gold), transparent, var(--gold), transparent);
  background-size: 400% 400%;
  z-index: -1;
  animation: borderRotate 6s linear infinite;
  opacity: 0.6;
}

@keyframes borderRotate {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

.title {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.8rem, 5vw, 2.8rem);
  margin-bottom: 30px;
  letter-spacing: 4px;
  background: linear-gradient(to right, #d4a017, #f5c842, #d4a017);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: shine 3s infinite linear;
}

/* GRID SYSTEM */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 15px;
  margin-bottom: 30px;
}

.box {
  background: rgba(255, 255, 255, 0.03);
  padding: 20px 10px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.05);
  transition: transform 0.3s ease;
}

.box:hover { transform: translateY(-5px); background: rgba(255,255,255,0.08); }

.num {
  display: block;
  font-family: 'Cinzel', serif;
  font-size: clamp(1.5rem, 4vw, 2.5rem);
  font-weight: 700;
  color: var(--gold);
  text-shadow: 0 0 15px var(--gold-glow);
}

.label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  opacity: 0.6;
  margin-top: 8px;
}

/* INPUT SECTION */
.setup-trigger {
  color: var(--gold);
  text-decoration: underline;
  cursor: pointer;
  font-size: 0.9rem;
  opacity: 0.8;
}

.controls {
  margin-top: 20px;
  display: none; /* Hidden by default */
  flex-direction: column;
  gap: 10px;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

input {
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.1);
  color: inherit;
  font-family: inherit;
  text-align: center;
}

button {
  padding: 12px 25px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, var(--gold), #f5c842);
  color: #000;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
}

button:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--gold-glow); }

/* MOBILE RESPONSIVENESS */
@media (max-width: 500px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
  .card { padding: 30px 15px; }
}
</style>
</head>

<body class="dark">

<div class="bg" id="bg"></div>

<div class="theme-btn" onclick="toggleTheme()" title="Toggle Theme">🌓</div>

<div class="container" id="scene">
  <div class="card" id="card">
    <h1 class="title">EVENT CLOCK</h1>
    
    <div class="grid">
      <div class="box"><span id="days" class="num">00</span><div class="label">Days</div></div>
      <div class="box"><span id="hours" class="num">00</span><div class="label">Hours</div></div>
      <div class="box"><span id="mins" class="num">00</span><div class="label">Mins</div></div>
      <div class="box"><span id="secs" class="num">00</span><div class="label">Secs</div></div>
    </div>

    <p class="setup-trigger" onclick="toggleControls()">Set Custom Date</p>
    
    <div class="controls" id="controls">
      <input type="datetime-local" id="dateInput">
      <button onclick="saveDate()">START COUNTDOWN</button>
    </div>

    <div id="message" style="margin-top: 20px; font-family: 'Cinzel'; display: none; color: var(--gold);">
      THE TIME HAS COME
    </div>
  </div>
</div>

<script>
let countdownInterval;

// Initialize from LocalStorage
window.onload = () => {
  const savedDate = localStorage.getItem('targetDate');
  if (savedDate) {
    startCountdown(parseInt(savedDate));
  }
  
  // Auto Dark Mode detection
  if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
    toggleTheme();
  }
};

function toggleControls() {
  const c = document.getElementById('controls');
  c.style.display = (c.style.display === 'flex') ? 'none' : 'flex';
}

function saveDate() {
  const val = document.getElementById('dateInput').value;
  if (!val) return;
  
  const target = new Date(val).getTime();
  localStorage.setItem('targetDate', target);
  startCountdown(target);
  toggleControls();
}

function startCountdown(target) {
  clearInterval(countdownInterval);
  
  function update() {
    const now = new Date().getTime();
    const diff = target - now;

    if (diff <= 0) {
      clearInterval(countdownInterval);
      document.getElementById('message').style.display = 'block';
      return;
    }

    document.getElementById('message').style.display = 'none';
    
    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((diff % (1000 * 60)) / 1000);

    animateValue('days', d);
    animateValue('hours', h);
    animateValue('mins', m);
    animateValue('secs', s);
  }

  update();
  countdownInterval = setInterval(update, 1000);
}

// Smooth number updates
function animateValue(id, value) {
  const el = document.getElementById(id);
  const formatted = String(value).padStart(id === 'days' ? 3 : 2, '0');
  if (el.textContent !== formatted) {
    el.style.transform = 'scale(1.2)';
    el.style.opacity = '0.5';
    setTimeout(() => {
      el.textContent = formatted;
      el.style.transform = 'scale(1)';
      el.style.opacity = '1';
    }, 150);
  }
}

function toggleTheme() {
  document.body.classList.toggle('light');
  document.body.classList.toggle('dark');
  const btn = document.querySelector('.theme-btn');
  btn.innerHTML = document.body.classList.contains('light') ? '🌙' : '☀️';
}

// MOUSE PARALLAX EFFECT
const scene = document.getElementById('scene');
const card = document.getElementById('card');
const bg = document.getElementById('bg');

document.addEventListener('mousemove', (e) => {
  const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
  const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
  
  card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
  bg.style.transform = `scale(1.1) translate(${xAxis * 2}px, ${yAxis * 2}px)`;
});

// Reset card on mouse leave
document.addEventListener('mouseleave', () => {
  card.style.transform = `rotateY(0deg) rotateX(0deg)`;
});
</script>

</body>
</html>
